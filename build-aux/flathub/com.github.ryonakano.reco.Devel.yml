id: com.github.ryonakano.reco.Devel
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: com.github.ryonakano.reco.Devel
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --env=GST_PLUGIN_PATH_1_0=/app/lib/gstreamer-1.0
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/vala
build-options:
  libdir: /app/lib
modules:
  - name: live-chart
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/lcallarec/live-chart/archive/1.10.0.tar.gz
        sha256: 3f54c7569cc2a4711b5689038055aefc4321636f3e6dd4945e4be204bc9d4843
        x-checker-data:
          type: json
          url: https://api.github.com/repos/lcallarec/live-chart/releases/latest
          version-query: .tag_name
          url-query: '"https://github.com/lcallarec/live-chart/archive/" + .tag_name + ".tar.gz"'
          timestamp-query: .published_at

  - name: gst-plugins-good
    buildsystem: meson
    config-opts:
      # Enable id3v2mux support
      - -Dtaglib=enabled
    sources:
      - type: archive
        # we need to use the same version with gstreamer included in the sdk
        url: https://gstreamer.freedesktop.org/src/gst-plugins-good/gst-plugins-good-1.26.10.tar.xz
        sha256: 7beacb5daba3c6751ebc1c85017d9b1d6de64e24798125932c73c8b1dbeb3bc9
    modules:
      - name: taglib
        buildsystem: cmake-ninja
        config-opts:
          - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
        sources:
          - type: archive
            url: https://github.com/taglib/taglib/releases/download/v2.2.1/taglib-2.2.1.tar.gz
            sha256: 7e76b5299dcef427c486bffe455098470c8da91cf3ccb9ea804893df57389b5e
            x-checker-data:
              type: json
              url: https://api.github.com/repos/taglib/taglib/releases/latest
              version-query: .tag_name | sub("v"; "")
              url-query: .assets[] | select(.name=="taglib-" + $version + ".tar.gz") | .browser_download_url
              timestamp-query: .published_at

  - name: gst-libav
    buildsystem: meson
    config-opts:
      - -Ddoc=disabled
    sources:
      - type: archive
        # we need to use the same version with gstreamer included in the sdk
        url: https://gstreamer.freedesktop.org/src/gst-libav/gst-libav-1.26.10.tar.xz
        sha256: c8c2fd29cc063a6d26c314cd1a0a3a3060c8a029981b9520fab52c4206d11611

  - name: ryokucha
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/ryonakano/ryokucha/archive/0.4.0.tar.gz
        sha256: b7bebd8caba5b33714958f6014f3bfedfbb3b5d92b0f046c0b0ab1a8fde0bcc2
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ryonakano/ryokucha/releases/latest
          version-query: .tag_name
          url-query: '"https://github.com/ryonakano/ryokucha/archive/" + .tag_name + ".tar.gz"'
          timestamp-query: .published_at
          tag-pattern: ^([\d.]+)$

  - name: reco
    buildsystem: meson
    config-opts:
      - -Duse_submodule=false
      - -Ddevelopment=true
    sources:
      - type: dir
        path: ../../
